name: "Flavourful"
type: theme
"base theme": olivero
version: 1.0.0
libraries:
  - flavourful/base
  - flavourful/messages
  - core/normalize
  - flavourful/global-styling
libraries-extend:
  user/drupal.user:
    - flavourful/user
  core/drupal.dropbutton:
    - flavourful/dropbutton
  core/drupal.dialog:
    - flavourful/dialog
  file/drupal.file:
    - flavourful/file
  core/drupal.item-list:
    - flavourful/item-list
  core/drupal.progress:
    - flavourful/progress
  core/drupal.tablesort:
    - flavourful/drupal.tablesort
description: ""
core_version_requirement: ^11
generator: "starterkit_theme:11.4.0"
# Regions are declared explicitly (rather than inherited from Olivero) so the
# left/right sidebars used by page.html.twig and the block layout actually
# exist. Without these, sidebar_first/sidebar_second blocks render unpositioned.
regions:
  header: "Header"
  primary_menu: "Primary menu"
  secondary_menu: "Secondary menu"
  breadcrumb: "Breadcrumb"
  highlighted: "Highlighted"
  help: "Help"
  content: "Content"
  sidebar_first: "Sidebar first (left)"
  sidebar_second: "Sidebar second (right)"
  footer: "Footer"
